<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <!-- Muted pewter silver — cool grey, no bright reflections -->
    <radialGradient id="sOuter" cx="42%" cy="38%" r="58%">
      <stop offset="0%"   stop-color="#9eafc2"/>
      <stop offset="55%"  stop-color="#5a7082"/>
      <stop offset="100%" stop-color="#273442"/>
    </radialGradient>
    <radialGradient id="sInner" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#afc0d0"/>
      <stop offset="50%"  stop-color="#647f90"/>
      <stop offset="100%" stop-color="#304050"/>
    </radialGradient>
    <!-- Subtle matte sheen, very low opacity -->
    <radialGradient id="sSheen" cx="32%" cy="28%" r="50%">
      <stop offset="0%"  stop-color="#c8d8e8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#647f90" stop-opacity="0"/>
    </radialGradient>
    <filter id="sshadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#0d1a24" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Outer medal -->
  <circle cx="40" cy="40" r="36" fill="url(#sOuter)" filter="url(#sshadow)"/>

  <!-- Subtle engraved sunburst (very low opacity) -->
  <g opacity="0.12" fill="#c8d8e8">
    <polygon points="40,5  37.5,19 42.5,19"/>
    <polygon points="63,17 51,26 55,31"/>
    <polygon points="75,40 61,37.5 61,42.5"/>
    <polygon points="63,63 55,51 50,56"/>
    <polygon points="40,75 42.5,61 37.5,61"/>
    <polygon points="17,63 25,51 30,56"/>
    <polygon points="5,40  19,42.5 19,37.5"/>
    <polygon points="17,17 29,26 25,31"/>
  </g>

  <!-- Engraved outer groove -->
  <circle cx="40" cy="40" r="32" fill="none" stroke="#273442" stroke-width="1.2" opacity="0.6"/>
  <circle cx="40" cy="40" r="31" fill="none" stroke="#9eafc2" stroke-width="0.5" opacity="0.3"/>

  <!-- Inner face -->
  <circle cx="40" cy="40" r="27" fill="url(#sInner)"/>

  <!-- Inner groove -->
  <circle cx="40" cy="40" r="23" fill="none" stroke="#273442" stroke-width="0.8" opacity="0.5"/>
  <circle cx="40" cy="40" r="22" fill="none" stroke="#afc0d0" stroke-width="0.4" opacity="0.3"/>

  <!-- 5-point star — muted cool white, no glow filter -->
  <path d="M40 23 l3.5 10.8h11.4l-9.2 6.68 3.5 10.8L40 44.6l-9.2 6.68 3.5-10.8L25.1 33.8h11.4z"
        fill="#c8d8e8" opacity="0.70"/>

  <!-- Matte sheen -->
  <circle cx="40" cy="40" r="27" fill="url(#sSheen)"/>
</svg>
