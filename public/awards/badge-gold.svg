<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <!-- Muted antique gold — desaturated, warm but not shiny -->
    <radialGradient id="gOuter" cx="42%" cy="38%" r="58%">
      <stop offset="0%"   stop-color="#c9a84c"/>
      <stop offset="55%"  stop-color="#8a6520"/>
      <stop offset="100%" stop-color="#4a3510"/>
    </radialGradient>
    <radialGradient id="gInner" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#d4aa55"/>
      <stop offset="50%"  stop-color="#9a7228"/>
      <stop offset="100%" stop-color="#5c4018"/>
    </radialGradient>
    <!-- Subtle matte sheen, very low opacity -->
    <radialGradient id="gSheen" cx="32%" cy="28%" r="50%">
      <stop offset="0%"  stop-color="#e8cc80" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#9a7228" stop-opacity="0"/>
    </radialGradient>
    <filter id="gshadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#2a1a05" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Outer medal -->
  <circle cx="40" cy="40" r="36" fill="url(#gOuter)" filter="url(#gshadow)"/>

  <!-- Subtle engraved sunburst (very low opacity) -->
  <g opacity="0.12" fill="#e8cc80">
    <polygon points="40,5  37.5,19 42.5,19"/>
    <polygon points="63,17 51,26 55,31"/>
    <polygon points="75,40 61,37.5 61,42.5"/>
    <polygon points="63,63 55,51 50,56"/>
    <polygon points="40,75 42.5,61 37.5,61"/>
    <polygon points="17,63 25,51 30,56"/>
    <polygon points="5,40  19,42.5 19,37.5"/>
    <polygon points="17,17 29,26 25,31"/>
  </g>

  <!-- Engraved outer groove -->
  <circle cx="40" cy="40" r="32" fill="none" stroke="#5c4018" stroke-width="1.2" opacity="0.6"/>
  <circle cx="40" cy="40" r="31" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.3"/>

  <!-- Inner face -->
  <circle cx="40" cy="40" r="27" fill="url(#gInner)"/>

  <!-- Inner groove -->
  <circle cx="40" cy="40" r="23" fill="none" stroke="#5c4018" stroke-width="0.8" opacity="0.5"/>
  <circle cx="40" cy="40" r="22" fill="none" stroke="#d4aa55" stroke-width="0.4" opacity="0.3"/>

  <!-- 5-point star — muted warm cream, no glow filter -->
  <path d="M40 23 l3.5 10.8h11.4l-9.2 6.68 3.5 10.8L40 44.6l-9.2 6.68 3.5-10.8L25.1 33.8h11.4z"
        fill="#e8cc80" opacity="0.75"/>

  <!-- Matte sheen -->
  <circle cx="40" cy="40" r="27" fill="url(#gSheen)"/>
</svg>
